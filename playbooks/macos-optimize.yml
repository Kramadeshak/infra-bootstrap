---
- name: Convert macOS into headless LLM node (llama.cpp optimized)
  hosts: macmini
  gather_facts: true
  become: true

  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

  vars:
    user_agents:
      - com.apple.Siri.agent
      - com.apple.assistantd
      - com.apple.photoanalysisd
      - com.apple.mediaanalysisd
      - com.apple.cloudphotod
      - com.apple.AMPArtworkAgent
      - com.apple.parsecd
      - com.apple.suggestd

    system_daemons:
      - com.apple.metadata.mds
      - com.apple.metadata.mds_stores

    kill_processes:
      - Siri
      - photoanalysisd
      - mediaanalysisd
      - mds
      - mdworker
      - suggestd
      - assistantd
      - sirittsd
      - siriactionsd
      - VTDecoderXPCService

    ui_processes:
      - Finder
      - Dock
      - ControlCenter
      - NotificationCenter

    ansible_become_password: "{{ ansible_password }}"

  tasks:

    # -----------------------------
    # Safety check (critical)
    # -----------------------------
    - name: Ensure target is macOS
      command: uname
      register: os_check
      failed_when: "'Darwin' not in os_check.stdout"

    - name: Get current user ID
      command: id -u
      register: user_id
      changed_when: false

    # -----------------------------
    # Disable user agents
    # -----------------------------
    - name: Disable user launch agents
      shell: |
        /bin/launchctl bootout gui/{{ user_id.stdout }}/{{ item }} 2>/dev/null || true
        /bin/launchctl disable gui/{{ user_id.stdout }}/{{ item }} 2>/dev/null || true
      loop: "{{ user_agents }}"
      changed_when: false

    # -----------------------------
    # Kill Spotlight HARD (no hangs)
    # -----------------------------
    - name: Kill Spotlight immediately
      shell: |
        /usr/bin/pkill -9 mds || true
        /usr/bin/pkill -9 mdworker || true
      changed_when: false

    - name: Disable Spotlight indexing
      command: /usr/bin/mdutil -a -i off
      failed_when: false

    - name: Disable Spotlight daemons
      shell: |
        /bin/launchctl disable system/{{ item }} || true
        /bin/launchctl bootout system/{{ item }} || true
      loop: "{{ system_daemons }}"
      changed_when: false

    # -----------------------------
    # Disable Siri
    # -----------------------------
    - name: Disable Siri UI + backend
      shell: |
        /usr/bin/defaults write com.apple.Siri StatusMenuVisible -bool false
        /usr/bin/defaults write com.apple.assistant.support "Assistant Enabled" -bool false
      changed_when: false

    # -----------------------------
    # Disable telemetry
    # -----------------------------
    - name: Disable analytics
      shell: |
        /usr/bin/defaults write /Library/Application\ Support/CrashReporter/DiagnosticMessagesHistory.plist AutoSubmit -bool false || true
        /usr/bin/defaults write /Library/Application\ Support/CrashReporter/DiagnosticMessagesHistory.plist ThirdPartyDataSubmit -bool false || true
      changed_when: false

    # -----------------------------
    # Disable iCloud sync
    # -----------------------------
    - name: Disable iCloud documents sync
      command: /usr/bin/defaults write NSGlobalDomain NSDocumentSaveNewDocumentsToCloud -bool false
      changed_when: false

    # -----------------------------
    # Kill background + AI junk
    # -----------------------------
    - name: Kill background processes
      shell: /usr/bin/pkill -f "{{ item }}" 2>/dev/null || true
      loop: "{{ kill_processes }}"
      changed_when: false

    # -----------------------------
    # Kill UI processes (BIG WIN)
    # -----------------------------
    - name: Kill UI processes
      shell: /usr/bin/killall "{{ item }}" 2>/dev/null || true
      loop: "{{ ui_processes }}"
      changed_when: false

    - name: Kill widgets + wallpaper
      shell: |
        /usr/bin/pkill -f Widget || true
        /usr/bin/killall WallpaperAgent || true
      changed_when: false

    # -----------------------------
    # Power tuning
    # -----------------------------
    - name: Disable sleep
      command: /usr/sbin/systemsetup -setcomputersleep Never

    - name: Disable disk sleep
      command: /usr/sbin/systemsetup -setharddisksleep Never

    - name: Disable display sleep
      command: /usr/sbin/systemsetup -setdisplaysleep Never

    - name: Set high performance mode
      shell: /usr/bin/pmset -a powermode 2 || true
      changed_when: false

    # -----------------------------
    # Disable Time Machine
    # -----------------------------
    - name: Disable Time Machine
      command: /usr/bin/tmutil disable
      ignore_errors: true

    # -----------------------------
    # Memory tuning
    # -----------------------------
    - name: Reduce memory compression overhead
      shell: /usr/sbin/sysctl -w vm.compressor_mode=2 || true
      changed_when: false

    # -----------------------------
    # Optional: FULL headless mode
    # -----------------------------
    - name: Kill GUI session (optional but huge gain)
      shell: |
        /usr/bin/pkill -KILL -u {{ user_id.stdout }} || true
      when: false   # <-- enable manually when ready
      changed_when: false

    # -----------------------------
    # Kill GUI session (THE key step)
    # -----------------------------
    - name: Kill GUI session (WindowServer, loginwindow, etc.)
      shell: |
        /bin/launchctl bootout gui/{{ user_id.stdout }} || true
      changed_when: false

    # -----------------------------
    # Kill leftover GPU/UI hogs
    # -----------------------------
    - name: Kill GPU + UI background processes
      shell: |
        /usr/bin/pkill -f VTDecoderXPCService || true
        /usr/bin/pkill -f Wallpaper || true
        /usr/bin/pkill -f Widget || true
      changed_when: false

    # -----------------------------
    # Verify cleanup (optional debug)
    # -----------------------------
    - name: Check if WindowServer is gone
      shell: ps aux | grep -i WindowServer | grep -v grep || true
      register: ws_check
      changed_when: false

    - debug:
        msg: "WindowServer still running!"
      when: ws_check.stdout != ""
